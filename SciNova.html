<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="SciNova — 과학을 진심으로 사랑하는 사람들의 커뮤니티">
<meta name="theme-color" content="#0a0e1a">
<title>SciNova — 과학 커뮤니티</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root{
  --bg:#0a0e1a;
  --bg2:#0f1525;
  --bg3:#141c30;
  --card:#171f35;
  --card2:#1d2640;
  --border:#2a3556;
  --border2:#364470;
  --accent:#4f8cff;
  --accent2:#00e5ff;
  --accent3:#a78bfa;
  --green:#10d4a0;
  --red:#ff5e7a;
  --yellow:#ffd166;
  --text:#e8edf8;
  --text2:#9ba8c5;
  --text3:#5d6e94;
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
button{cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
input,select,textarea{font-family:'Noto Sans KR',sans-serif;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ═══════════════════════════════════════════
   STARS BACKGROUND
═══════════════════════════════════════════ */
#stars{
  position:fixed;top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;z-index:0;overflow:hidden;
}
.star{
  position:absolute;background:#fff;border-radius:50%;
  animation:twinkle var(--d,3s) ease-in-out infinite var(--dl,0s);
}
@keyframes twinkle{0%,100%{opacity:.08}50%{opacity:.65}}

/* ═══════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════ */
.screen{display:none;position:relative;z-index:1;}
.screen.active{display:block;}
#auth-screen.active{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:24px;
}

/* ═══════════════════════════════════════════
   AUTH
═══════════════════════════════════════════ */
.auth-logo{text-align:center;margin-bottom:36px;animation:fadeDown .7s ease both;}
.logo-icon{font-size:56px;display:block;margin-bottom:14px;filter:drop-shadow(0 0 28px var(--accent));}
.auth-logo h1{
  font-family:'Syne',sans-serif;font-size:40px;font-weight:800;letter-spacing:-1.5px;
  background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.auth-logo p{color:var(--text2);font-size:15px;margin-top:8px;letter-spacing:.2px;}

.auth-box{
  background:var(--card);
  border:1px solid var(--border2);
  border-radius:22px;
  padding:36px;
  width:100%;max-width:430px;
  box-shadow:0 0 0 1px rgba(79,140,255,.08), 0 0 40px rgba(79,140,255,.12), 0 28px 60px rgba(0,0,0,.55);
  animation:fadeUp .7s ease both;
}

.tabs{
  display:flex;gap:4px;
  background:var(--bg3);
  border-radius:12px;padding:4px;
  margin-bottom:26px;
}
.tab{
  flex:1;padding:11px;border:none;background:transparent;
  color:var(--text3);border-radius:9px;
  font-size:14px;font-weight:500;transition:all .2s;
}
.tab.on{background:var(--card2);color:var(--accent);box-shadow:0 2px 10px rgba(0,0,0,.35);}

.form{display:none;flex-direction:column;gap:15px;}
.form.on{display:flex;}

.fg{display:flex;flex-direction:column;gap:8px;}
.fg label{font-size:13px;color:var(--text2);font-weight:500;letter-spacing:.1px;}
.fg label span{color:var(--text3);font-size:12px;font-weight:400;}
.fg input,.fg select,.fg textarea{
  background:var(--bg3);
  border:1.5px solid var(--border);
  border-radius:11px;
  padding:12px 16px;
  color:var(--text);
  font-size:14px;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  width:100%;
}
.fg input::placeholder,.fg textarea::placeholder{color:var(--text3);}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(79,140,255,.18);
}
.fg select option{background:var(--bg2);}
.fg textarea{resize:vertical;min-height:90px;line-height:1.6;}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 22px;border:none;border-radius:11px;
  font-size:14px;font-weight:600;transition:all .2s;
  white-space:nowrap;
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#3568d4);
  color:#fff;
  box-shadow:0 4px 18px rgba(79,140,255,.35);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,140,255,.48);}
.btn-primary:active{transform:translateY(0);}
.btn-ghost{background:transparent;color:var(--text2);border:1.5px solid var(--border2);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--border2);}
.btn-danger{background:linear-gradient(135deg,var(--red),#c0284a);color:#fff;}
.btn-danger:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,94,122,.35);}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:9px;}
.btn-xs{padding:6px 12px;font-size:12px;border-radius:8px;}
.btn-full{width:100%;}

/* ═══════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════ */
.navbar{
  position:sticky;top:0;z-index:200;
  background:rgba(10,14,26,.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
  height:62px;padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.nav-logo .em{font-size:24px;line-height:1;}
.nav-brand{
  font-family:'Syne',sans-serif;font-size:21px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-r{display:flex;align-items:center;gap:10px;}
.nav-user{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border2);
  border-radius:30px;padding:5px 14px 5px 7px;
}
.nav-av{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;flex-shrink:0;
}
.nav-nm{font-size:13px;font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ═══════════════════════════════════════════
   APP LAYOUT (3-column)
═══════════════════════════════════════════ */
.app-wrap{
  display:grid;
  grid-template-columns:240px 1fr 268px;
  min-height:calc(100vh - 62px);
}

/* ─── LEFT SIDEBAR ─── */
.sidebar{
  border-right:1px solid var(--border);
  padding:22px 0;
  position:sticky;top:62px;
  height:calc(100vh - 62px);
  overflow-y:auto;
}
.sb-sec{margin-bottom:24px;}
.sb-label{
  padding:0 20px;
  font-size:10.5px;font-weight:700;letter-spacing:1.8px;
  color:var(--text3);text-transform:uppercase;
  margin-bottom:6px;
  font-family:'Space Mono',monospace;
}
.sb-item{
  display:flex;align-items:center;gap:11px;
  padding:11px 20px;
  color:var(--text2);font-size:14px;font-weight:400;
  border-left:3px solid transparent;
  cursor:pointer;transition:all .15s;
  user-select:none;
}
.sb-item:hover{background:var(--bg3);color:var(--text);}
.sb-item.on{
  background:rgba(79,140,255,.09);
  border-left-color:var(--accent);
  color:var(--accent);font-weight:500;
}
.sb-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}

/* ─── MAIN ─── */
.main{padding:26px;min-height:calc(100vh - 62px);}

/* ─── RIGHT SIDEBAR ─── */
.rsb{
  border-left:1px solid var(--border);
  padding:22px 18px;
  position:sticky;top:62px;
  height:calc(100vh - 62px);
  overflow-y:auto;
}

/* ═══════════════════════════════════════════
   VIEWS
═══════════════════════════════════════════ */
.view{display:none;}
.view.on{display:block;}

.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.ph h2{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}

.search-wrap{margin-bottom:18px;}
.search-wrap input{
  width:100%;background:var(--card);
  border:1.5px solid var(--border);border-radius:11px;
  padding:12px 18px;color:var(--text);font-size:14px;
  outline:none;transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--text3);}

/* ═══════════════════════════════════════════
   POST CARD
═══════════════════════════════════════════ */
.pc{
  background:var(--card);border:1.5px solid var(--border);
  border-radius:15px;padding:20px;margin-bottom:12px;
  cursor:pointer;transition:all .2s;
  animation:fadeUp .3s ease both;
}
.pc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.35);}
.pc:active{transform:translateY(0);}

.pm{display:flex;align-items:center;gap:9px;margin-bottom:11px;flex-wrap:wrap;}
.pcat{
  font-size:11px;font-weight:700;padding:3px 10px;
  border-radius:20px;letter-spacing:.6px;
  font-family:'Space Mono',monospace;white-space:nowrap;
  flex-shrink:0;
}
.pau{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);}
.mav{
  width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent3),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;color:#fff;flex-shrink:0;
}
.mav-lg{width:28px;height:28px;font-size:13px;}
.pt{margin-left:auto;font-size:12px;color:var(--text3);font-family:'Space Mono',monospace;white-space:nowrap;}

.ptitle{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:8px;line-height:1.4;word-break:break-word;}
.pprev{
  font-size:14px;color:var(--text2);line-height:1.65;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:13px;word-break:break-word;
}
.pf{display:flex;align-items:center;gap:16px;}
.pstat{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text3);}

/* ─── Category pill colors ─── */
.c-p{background:rgba(79,140,255,.14);color:#4f8cff;}
.c-b{background:rgba(16,212,160,.14);color:#10d4a0;}
.c-c{background:rgba(255,209,102,.14);color:#e8b93a;}
.c-a{background:rgba(167,139,250,.14);color:#a78bfa;}
.c-m{background:rgba(255,94,122,.14);color:#ff5e7a;}
.c-i{background:rgba(0,229,255,.14);color:#00c8e0;}
.c-e{background:rgba(136,221,68,.14);color:#7cce32;}
.c-f{background:rgba(152,152,200,.14);color:#9898c8;}

/* ═══════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════ */
.empty{text-align:center;padding:72px 20px;color:var(--text3);}
.empty .em{font-size:54px;margin-bottom:16px;display:block;}
.empty p{font-size:15px;line-height:1.7;}
.empty small{font-size:13px;color:var(--text3);margin-top:8px;display:block;}

/* ═══════════════════════════════════════════
   POST DETAIL
═══════════════════════════════════════════ */
.back{
  display:inline-flex;align-items:center;gap:7px;
  color:var(--text2);font-size:14px;cursor:pointer;
  margin-bottom:18px;transition:color .2s;
  font-weight:500;
}
.back:hover{color:var(--accent);}

.pd-box{background:var(--card);border:1.5px solid var(--border);border-radius:15px;padding:28px;margin-bottom:16px;}
.pd-title{font-family:'Syne',sans-serif;font-size:25px;font-weight:800;line-height:1.35;margin:14px 0 18px;word-break:break-word;}
.pd-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.pd-body{
  font-size:15px;line-height:1.9;color:var(--text);
  white-space:pre-wrap;word-break:break-word;
  padding:22px 0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  margin-bottom:18px;
}
.pd-acts{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}

.like-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 22px;background:var(--bg3);
  border:1.5px solid var(--border2);border-radius:22px;
  font-size:14px;color:var(--text2);transition:all .2s;
}
.like-btn:hover,.like-btn.liked{
  background:rgba(255,94,122,.12);
  border-color:var(--red);color:var(--red);
}

/* ═══════════════════════════════════════════
   COMMENTS
═══════════════════════════════════════════ */
.cs-box{background:var(--card);border:1.5px solid var(--border);border-radius:15px;padding:24px;}
.cs-hd{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
  margin-bottom:18px;display:flex;align-items:center;gap:8px;
}
.cs-cnt{
  background:var(--accent);color:#fff;
  font-size:11px;padding:2px 9px;border-radius:10px;
  font-family:'Space Mono',monospace;
}
.ci{padding:16px 0;border-bottom:1px solid var(--border);animation:fadeUp .25s ease both;}
.ci:last-of-type{border-bottom:none;}
.ci-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ci-name{font-size:13px;font-weight:600;}
.ci-mine{font-size:11px;color:var(--accent);font-family:'Space Mono',monospace;}
.ci-time{font-size:11px;color:var(--text3);margin-left:auto;font-family:'Space Mono',monospace;}
.ci-del{
  margin-left:6px;font-size:11px;color:var(--text3);
  background:none;border:none;transition:color .2s;padding:0;
}
.ci-del:hover{color:var(--red);}
.ci-body{font-size:14px;color:var(--text2);line-height:1.7;white-space:pre-wrap;word-break:break-word;}

.cw{margin-top:22px;display:flex;flex-direction:column;gap:10px;}
.cw textarea{
  background:var(--bg3);border:1.5px solid var(--border);border-radius:11px;
  padding:13px 16px;color:var(--text);font-size:14px;
  outline:none;resize:vertical;min-height:84px;line-height:1.6;
  transition:border-color .2s;
}
.cw textarea:focus{border-color:var(--accent);}
.cw textarea::placeholder{color:var(--text3);}
.cw-f{display:flex;align-items:center;justify-content:space-between;}
.char-c{font-size:12px;color:var(--text3);font-family:'Space Mono',monospace;}

/* ═══════════════════════════════════════════
   MODAL
═══════════════════════════════════════════ */
.mo-wrap{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  z-index:500;align-items:center;justify-content:center;padding:20px;
}
.mo-wrap.on{display:flex;}
.modal{
  background:var(--card);border:1.5px solid var(--border2);
  border-radius:20px;padding:30px;
  width:100%;max-width:530px;
  box-shadow:0 28px 70px rgba(0,0,0,.55);
  animation:fadeUp .3s ease both;
  max-height:90vh;overflow-y:auto;
}
.modal h3{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;margin-bottom:20px;}
.mo-body{display:flex;flex-direction:column;gap:15px;}
.mo-f{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

/* ═══════════════════════════════════════════
   WIDGETS (Right sidebar)
═══════════════════════════════════════════ */
.wg{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:14px;}
.wg-t{
  font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.2px;color:var(--text3);
  margin-bottom:12px;
}
.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.sr:last-child{border-bottom:none;}
.sr-l{color:var(--text2);}
.sr-v{font-family:'Space Mono',monospace;color:var(--accent);font-weight:700;}
.hp{padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:color .2s;}
.hp:last-child{border-bottom:none;}
.hp:hover{color:var(--accent);}
.hp-t{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:3px;}
.hp-m{font-size:11px;color:var(--text3);font-family:'Space Mono',monospace;}

/* ═══════════════════════════════════════════
   PROFILE
═══════════════════════════════════════════ */
.prof-card{background:var(--card);border:1.5px solid var(--border);border-radius:15px;padding:28px;text-align:center;margin-bottom:20px;}
.prof-av{
  width:74px;height:74px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent3));
  display:flex;align-items:center;justify-content:center;
  font-size:30px;font-weight:800;color:#fff;
  margin:0 auto 14px;
  border:3px solid rgba(79,140,255,.35);
  box-shadow:0 0 20px rgba(79,140,255,.2);
}
.prof-nm{font-family:'Syne',sans-serif;font-size:23px;font-weight:800;margin-bottom:4px;}
.prof-fd{font-size:13px;color:var(--accent2);margin-bottom:5px;font-family:'Space Mono',monospace;}
.prof-jd{font-size:12px;color:var(--text3);}
.prof-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--border);
  border-radius:11px;overflow:hidden;margin-top:18px;
}
.ps{background:var(--bg3);padding:14px 8px;text-align:center;}
.ps-v{font-family:'Syne',sans-serif;font-size:23px;font-weight:800;color:var(--accent);}
.ps-l{font-size:11px;color:var(--text3);margin-top:2px;}

/* ═══════════════════════════════════════════
   TOAST NOTIFICATION
═══════════════════════════════════════════ */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(90px);
  background:var(--card2);border:1.5px solid var(--border2);
  border-radius:13px;padding:13px 26px;
  font-size:14px;font-weight:500;
  z-index:9999;transition:transform .32s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 10px 40px rgba(0,0,0,.5);
  white-space:nowrap;pointer-events:none;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}

/* ═══════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════ */
@media(max-width:1140px){
  .app-wrap{grid-template-columns:220px 1fr;}
  .rsb{display:none;}
}
@media(max-width:740px){
  .app-wrap{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .main{padding:16px;}
  .pd-title{font-size:20px;}
}
</style>
</head>
<body>

<!-- STARS -->
<div id="stars"></div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ═══════════════════════════════════════════════════════════
     AUTH SCREEN
════════════════════════════════════════════════════════════ -->
<div class="screen active" id="auth-screen">

  <div class="auth-logo">
    <span class="logo-icon">🔭</span>
    <h1>SciNova</h1>
    <p>과학을 진심으로 사랑하는 사람들의 커뮤니티</p>
  </div>

  <div class="auth-box">
    <div class="tabs">
      <button class="tab on" onclick="switchTab('login')">로그인</button>

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT
════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── localStorage helpers ── */
const db = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};
const getUsers  = ()   => db.get('sn_users')  || [];
const getPosts  = ()   => db.get('sn_posts')  || [];
const getLikes  = ()   => db.get('sn_lk_' + (CU?.id || '')) || [];
const saveUsers = u    => db.set('sn_users', u);
const savePosts = p    => db.set('sn_posts', p);
const saveLikes = l    => db.set('sn_lk_' + CU.id, l);

/* ── App state ── */
let CU   = null;   // current user
let VIEW = 'home'; // current view
let PREV = 'home'; // prev view
let CAT  = null;   // active category

/* ══════════════════════════════════════════════
   STARS
══════════════════════════════════════════════ */
(function buildStars() {
  const c = document.getElementById('stars');
  const f = document.createDocumentFragment();
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const z = Math.random() * 2.5 + 0.4;
    s.style.cssText = [
      `left:${Math.random()*100}%`,
      `top:${Math.random()*100}%`,
      `width:${z}px`,
      `height:${z}px`,
      `--d:${(2 + Math.random() * 4).toFixed(1)}s`,
      `--dl:${(Math.random() * 5).toFixed(1)}s`,
      `opacity:${(Math.random() * 0.45 + 0.08).toFixed(2)}`
    ].join(';');
    f.appendChild(s);
  }
  c.appendChild(f);
})();

/* ══════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════ */
function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) =>
    el.classList.toggle('on', (i === 0 && t === 'login') || (i === 1 && t === 'signup')));
  document.getElementById('f-login').classList.toggle('on', t === 'login');
  document.getElementById('f-signup').classList.toggle('on', t === 'signup');
}

function login() {
  const email = document.getElementById('li-email').value.trim();
  const pw    = document.getElementById('li-pw').value;
  if (!email || !pw) { toast('이메일과 비밀번호를 입력하세요.', 'err'); return; }
  const user = getUsers().find(u => u.email === email && u.pw === pw);
  if (!user) { toast('이메일 또는 비밀번호가 틀렸습니다.', 'err'); return; }
  enterApp(user);
}

function signup() {
  const name  = document.getElementById('su-nm').value.trim();
  const email = document.getElementById('su-em').value.trim();
  const pw    = document.getElementById('su-pw').value;
  const field = document.getElementById('su-fd').value || '과학 전반';
  if (!name)                 { toast('닉네임을 입력하세요.', 'err'); return; }
  if (!email.includes('@'))  { toast('올바른 이메일을 입력하세요.', 'err'); return; }
  if (pw.length < 6)         { toast('비밀번호는 6자 이상이어야 합니다.', 'err'); return; }
  const users = getUsers();
  if (users.find(u => u.email === email)) { toast('이미 사용 중인 이메일입니다.', 'err'); return; }
  if (users.find(u => u.name === name))   { toast('이미 사용 중인 닉네임입니다.', 'err'); return; }
  const user = { id: 'u' + Date.now(), name, email, pw, field, joined: fmtDate(new Date()) };
  users.push(user);
  saveUsers(users);
  enterApp(user);
  toast('🎉 환영합니다, ' + name + '님!', 'ok');
}

function enterApp(user) {
  CU = user;
  document.getElementById('nav-av').textContent = user.name[0];
  document.getElementById('nav-nm').textContent = user.name;
  document.getElementById('auth-screen').classList.remove('active');
  document.getElementById('app-screen').classList.add('active');
  nav('home');
  renderWidgets();
}

function logout() {
  CU = null;
  document.getElementById('app-screen').classList.remove('active');
  document.getElementById('auth-screen').classList.add('active');
  document.getElementById('li-email').value = '';
  document.getElementById('li-pw').value = '';
  switchTab('login');
  toast('로그아웃 되었습니다.');
}

/* ══════════════════════════════════════════════
   NAVIGATION
══════════════════════════════════════════════ */
function nav(v) {
  PREV = VIEW; VIEW = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('on'));
  document.getElementById('v-' + v).classList.add('on');
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('on'));
  const sn = document.getElementById('sn-' + v);
  if (sn) sn.classList.add('on');
  if (v === 'home')    renderHome();
  if (v === 'popular') renderPopular();
  if (v === 'profile') renderProfile();
}

function goHome() { CAT = null; nav('home'); }

function goBack() {
  if (PREV === 'category' && CAT) goCat(CAT);
  else if (PREV === 'popular')    nav('popular');
  else nav('home');
}

function goCat(cat) {
  CAT = cat;
  const icons = { '물리학':'⚛️','생명과학':'🧬','화학':'🧪','천문학':'🌌','수학':'📐','AI / 컴퓨터과학':'🤖','지구과학':'🌍','자유토론':'💬' };
  document.getElementById('cat-h').textContent = (icons[cat] || '') + '  ' + cat;
  PREV = VIEW; VIEW = 'category';
  document.querySelectorAll('.view').forEach(el => el.classList.remove('on'));
  document.getElementById('v-category').classList.add('on');
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('on'));
  const list = getPosts().filter(p => p.category === cat).sort((a, b) => b.id - a.id);
  document.getElementById('cat-list').innerHTML = list.length
    ? list.map(postCard).join('')
    : emptyState('🔬', '아직 이 카테고리에 글이 없습니다.', '첫 번째 글을 작성해보세요!');
}

/* ══════════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════════ */
const CAT_CLS = {
  '물리학':'c-p','생명과학':'c-b','화학':'c-c','천문학':'c-a',
  '수학':'c-m','AI / 컴퓨터과학':'c-i','지구과학':'c-e','자유토론':'c-f'
};
const catCls = c => CAT_CLS[c] || 'c-f';

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtDate(d) {
  return d.getFullYear() + '-' +
    String(d.getMonth() + 1).padStart(2, '0') + '-' +
    String(d.getDate()).padStart(2, '0');
}

function fmtTime(d) {
  const s = Math.floor((Date.now() - d) / 1000);
  if (s < 60)    return '방금 전';
  if (s < 3600)  return Math.floor(s / 60) + '분 전';
  if (s < 86400) return Math.floor(s / 3600) + '시간 전';
  return fmtDate(new Date(d));
}

function emptyState(em, msg, sub = '') {
  return `<div class="empty"><span class="em">${em}</span><p>${msg}</p><small>${sub}</small></div>`;
}

/* ══════════════════════════════════════════════
   POST CARD
══════════════════════════════════════════════ */
function postCard(p) {
  const prev = p.body.replace(/\n/g, ' ').slice(0, 120) + (p.body.length > 120 ? '…' : '');
  return `
  <div class="pc" onclick="openPost(${p.id})">
    <div class="pm">
      <span class="pcat ${catCls(p.category)}">${esc(p.category)}</span>
      <div class="pau"><div class="mav">${esc(p.author)[0]}</div>${esc(p.author)}</div>
      <span class="pt">${p.time}</span>
    </div>
    <div class="ptitle">${esc(p.title)}</div>
    <div class="pprev">${esc(prev)}</div>
    <div class="pf">
      <div class="pstat">❤️ ${p.likes}</div>
      <div class="pstat">💬 ${p.comments.length}</div>
      <div class="pstat">👁️ ${p.views}</div>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════
   HOME
══════════════════════════════════════════════ */
function renderHome() {
  const q = (document.getElementById('sq')?.value || '').toLowerCase();
  let list = getPosts().sort((a, b) => b.id - a.id);
  if (q) list = list.filter(p => p.title.toLowerCase().includes(q) || p.body.toLowerCase().includes(q));
  document.getElementById('home-list').innerHTML = list.length
    ? list.map(postCard).join('')
    : emptyState('🔭', '아직 작성된 글이 없습니다.', '위의 ✏️ 글쓰기 버튼을 눌러 첫 글을 남겨보세요!');
}

/* ══════════════════════════════════════════════
   POPULAR
══════════════════════════════════════════════ */
function renderPopular() {
  const list = getPosts()
    .sort((a, b) => (b.likes * 3 + b.views * 0.1 + b.comments.length * 2) -
                    (a.likes * 3 + a.views * 0.1 + a.comments.length * 2))
    .slice(0, 10);
  const medal = i => i === 0 ? '#ffd166' : i === 1 ? '#b8c8d8' : i === 2 ? '#cd7f32' : 'var(--text3)';
  document.getElementById('popular-list').innerHTML = list.length
    ? list.map((p, i) => `
      <div class="pc" onclick="openPost(${p.id})">
        <div class="pm">
          <span style="font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:${medal(i)};">#${i+1}</span>
          <span class="pcat ${catCls(p.category)}">${esc(p.category)}</span>
          <span class="pt">${p.time}</span>
        </div>
        <div class="ptitle">${esc(p.title)}</div>
        <div class="pf">
          <div class="pstat">❤️ ${p.likes}</div>
          <div class="pstat">💬 ${p.comments.length}</div>
          <div class="pstat">👁️ ${p.views}</div>
        </div>
      </div>`).join('')
    : emptyState('🔥', '아직 게시글이 없습니다.', '글을 작성하면 인기글이 여기에 집계됩니다.');
}

/* ══════════════════════════════════════════════
   PROFILE
══════════════════════════════════════════════ */
function renderProfile() {
  const mine  = getPosts().filter(p => p.uid === CU.id).sort((a, b) => b.id - a.id);
  const likes = mine.reduce((s, p) => s + p.likes, 0);
  const cmts  = mine.reduce((s, p) => s + p.comments.length, 0);
  document.getElementById('profile-content').innerHTML = `
    <div class="prof-card">
      <div class="prof-av">${esc(CU.name)[0]}</div>
      <div class="prof-nm">${esc(CU.name)}</div>
      <div class="prof-fd">${esc(CU.field)}</div>
      <div class="prof-jd">가입일 ${CU.joined}</div>
      <div class="prof-stats">
        <div class="ps"><div class="ps-v">${mine.length}</div><div class="ps-l">게시글</div></div>
        <div class="ps"><div class="ps-v">${likes}</div><div class="ps-l">받은 좋아요</div></div>
        <div class="ps"><div class="ps-v">${cmts}</div><div class="ps-l">내 글 댓글</div></div>
      </div>
    </div>
    <div class="ph"><h2>내가 쓴 글 (${mine.length})</h2></div>
    ${mine.length ? mine.map(postCard).join('') : emptyState('📝', '아직 작성한 글이 없습니다.', '첫 글을 작성해보세요!')}
  `;
}

/* ══════════════════════════════════════════════
   POST DETAIL
══════════════════════════════════════════════ */
function openPost(pid) {
  const posts = getPosts();
  const idx = posts.findIndex(p => p.id === pid);
  if (idx < 0) return;
  posts[idx].views++;
  savePosts(posts);
  PREV = VIEW; VIEW = 'post';
  document.querySelectorAll('.view').forEach(el => el.classList.remove('on'));
  document.getElementById('v-post').classList.add('on');
  document.querySelectorAll('.sb-item').forEach(el => el.classList.remove('on'));
  renderDetail(posts[idx]);
  renderWidgets();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDetail(p) {
  const liked = getLikes().includes(p.id);
  const mine  = p.uid === CU.id;

  const commentsHtml = p.comments.length
    ? p.comments.map(c => `
      <div class="ci">
        <div class="ci-hd">
          <div class="mav mav-lg">${esc(c.author)[0]}</div>
          <span class="ci-name">${esc(c.author)}</span>
          ${c.uid === CU.id ? '<span class="ci-mine">내 댓글</span>' : ''}
          <span class="ci-time">${c.time}</span>
          ${c.uid === CU.id
            ? `<button class="ci-del" onclick="delComment(${p.id},'${c.id}')">✕ 삭제</button>`
            : ''}
        </div>
        <div class="ci-body">${esc(c.body)}</div>
      </div>`).join('')
    : `<div style="text-align:center;padding:30px;color:var(--text3);font-size:14px;">
         첫 번째 댓글을 남겨보세요! 💬
       </div>`;

  document.getElementById('post-detail').innerHTML = `
    <div class="pd-box">
      <span class="pcat ${catCls(p.category)}">${esc(p.category)}</span>
      <div class="pd-title">${esc(p.title)}</div>
      <div class="pd-meta">
        <div class="pau">
          <div class="mav mav-lg">${esc(p.author)[0]}</div>
          <strong style="font-size:14px;">${esc(p.author)}</strong>
        </div>
        <span style="font-size:13px;color:var(--text3);font-family:'Space Mono',monospace;">${p.time}</span>
        <span style="font-size:13px;color:var(--text3);">👁️ ${p.views}</span>
      </div>
      <div class="pd-body">${esc(p.body)}</div>
      <div class="pd-acts">
        <button class="like-btn ${liked ? 'liked' : ''}" id="lb${p.id}" onclick="toggleLike(${p.id})">
          ❤️ 좋아요&nbsp;<span id="lc${p.id}">${p.likes}</span>
        </button>
        ${mine ? `<button class="btn btn-danger btn-sm" onclick="delPost(${p.id})">🗑️ 삭제</button>` : ''}
      </div>
    </div>

    <div class="cs-box">
      <div class="cs-hd">
        댓글 <span class="cs-cnt" id="cc${p.id}">${p.comments.length}</span>
      </div>
      <div id="cl${p.id}">${commentsHtml}</div>
      <div class="cw">
        <textarea id="ci${p.id}"
          placeholder="댓글을 입력하세요... (Ctrl+Enter 로 빠르게 등록)"
          rows="3"
          onkeydown="if(event.ctrlKey&&event.key==='Enter')addComment(${p.id})"
          oninput="document.getElementById('ch${p.id}').textContent=this.value.length+'/500'">
        </textarea>
        <div class="cw-f">
          <span class="char-c" id="ch${p.id}">0/500</span>
          <button class="btn btn-primary btn-sm" onclick="addComment(${p.id})">댓글 등록 💬</button>
        </div>
      </div>
    </div>
  `;
}

/* ── Like ── */
function toggleLike(pid) {
  const posts = getPosts();
  const idx = posts.findIndex(p => p.id === pid);
  if (idx < 0) return;
  const likes = getLikes();
  if (likes.includes(pid)) {
    posts[idx].likes = Math.max(0, posts[idx].likes - 1);
    saveLikes(likes.filter(x => x !== pid));
    document.getElementById('lb' + pid)?.classList.remove('liked');
    toast('좋아요를 취소했습니다.');
  } else {
    posts[idx].likes++;
    saveLikes([...likes, pid]);
    document.getElementById('lb' + pid)?.classList.add('liked');
    toast('❤️ 좋아요!', 'ok');
  }
  const el = document.getElementById('lc' + pid);
  if (el) el.textContent = posts[idx].likes;
  savePosts(posts);
  renderWidgets();
}

/* ── Add Comment ── */
function addComment(pid) {
  const ta = document.getElementById('ci' + pid);
  const body = ta.value.trim();
  if (!body)         { toast('댓글 내용을 입력하세요.', 'err'); return; }
  if (body.length > 500) { toast('댓글은 500자 이내로 작성해주세요.', 'err'); return; }
  const posts = getPosts();
  const idx = posts.findIndex(p => p.id === pid);
  if (idx < 0) return;
  const c = { id: 'c' + Date.now(), uid: CU.id, author: CU.name, body, time: fmtTime(Date.now()) };
  posts[idx].comments.push(c);
  savePosts(posts);
  ta.value = '';
  document.getElementById('ch' + pid).textContent = '0/500';
  renderDetail(posts[idx]);
  renderWidgets();
  toast('댓글이 등록되었습니다! 💬', 'ok');
}

/* ── Delete Comment ── */
function delComment(pid, cid) {
  if (!confirm('댓글을 삭제하시겠습니까?')) return;
  const posts = getPosts();
  const idx = posts.findIndex(p => p.id === pid);
  if (idx < 0) return;
  posts[idx].comments = posts[idx].comments.filter(c => c.id !== cid);
  savePosts(posts);
  renderDetail(posts[idx]);
  renderWidgets();
  toast('댓글이 삭제되었습니다.');
}

/* ── Delete Post ── */
function delPost(pid) {
  if (!confirm('이 글을 정말 삭제하시겠습니까?')) return;
  savePosts(getPosts().filter(p => p.id !== pid));
  toast('글이 삭제되었습니다.');
  goBack();
  renderWidgets();
}

/* ══════════════════════════════════════════════
   WRITE POST
══════════════════════════════════════════════ */
function openWrite() {
  document.getElementById('w-title').value = '';
  document.getElementById('w-body').value  = '';
  document.getElementById('wm').classList.add('on');
  setTimeout(() => document.getElementById('w-title').focus(), 80);
}
function closeWrite() { document.getElementById('wm').classList.remove('on'); }

function submitPost() {
  const title = document.getElementById('w-title').value.trim();
  const body  = document.getElementById('w-body').value.trim();
  const cat   = document.getElementById('w-cat').value;
  if (!title)        { toast('제목을 입력하세요.', 'err'); return; }
  if (body.length < 10) { toast('내용을 10자 이상 작성해주세요.', 'err'); return; }

  const posts = getPosts();
  const p = {
    id: Date.now(),
    uid: CU.id,
    author: CU.name,
    category: cat,
    title,
    body,
    time: fmtTime(Date.now()),
    likes: 0,
    comments: [],
    views: 0,
  };
  posts.unshift(p);
  savePosts(posts);
  closeWrite();
  toast('✅ 게시글이 등록되었습니다!', 'ok');
  if (VIEW === 'category' && CAT === cat) goCat(cat);
  else { CAT = null; nav('home'); }
  renderWidgets();
}

/* Close modal on backdrop click */
document.getElementById('wm').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeWrite();
});

/* ══════════════════════════════════════════════
   WIDGETS
══════════════════════════════════════════════ */
function renderWidgets() {
  const posts = getPosts();
  const users = getUsers();

  /* Hot posts */
  const hot = [...posts].sort((a, b) => b.likes - a.likes).slice(0, 5);
  document.getElementById('w-hot').innerHTML = hot.length
    ? hot.map(p => `
        <div class="hp" onclick="openPost(${p.id})">
          <div class="hp-t">${esc(p.title.slice(0, 38))}${p.title.length > 38 ? '…' : ''}</div>
          <div class="hp-m">❤️ ${p.likes} · 💬 ${p.comments.length}</div>
        </div>`).join('')
    : `<p style="color:var(--text3);font-size:13px;padding:6px 0;">아직 게시글이 없습니다.</p>`;

  /* Community stats */
  const totalCmts = posts.reduce((s, p) => s + p.comments.length, 0);
  document.getElementById('w-stats').innerHTML = `
    <div class="sr"><span class="sr-l">총 회원</span><span class="sr-v">${users.length}명</span></div>
    <div class="sr"><span class="sr-l">총 게시글</span><span class="sr-v">${posts.length}개</span></div>
    <div class="sr"><span class="sr-l">총 댓글</span><span class="sr-v">${totalCmts}개</span></div>
  `;

  /* Category counts */
  const CATS = ['물리학','생명과학','화학','천문학','수학','AI / 컴퓨터과학','지구과학','자유토론'];
  const ICOS = ['⚛️','🧬','🧪','🌌','📐','🤖','🌍','💬'];
  document.getElementById('w-cats').innerHTML = CATS.map((c, i) => {
    const n = posts.filter(p => p.category === c).length;
    return `<div class="sr"><span class="sr-l">${ICOS[i]} ${c}</span><span class="sr-v">${n}</span></div>`;
  }).join('');
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className   = 'toast' + (type ? ' ' + type : '');
  void t.offsetWidth;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
